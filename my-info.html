<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>나의 정보</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👤</text></svg>">
  <script src="./theme.js"></script>
  <link rel="stylesheet" href="./styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./supabase-config.js"></script>
  <script defer src="./supabase-client.js"></script>
  <script defer src="./auth-guard.js"></script>
  <script defer src="./my-info.js"></script>
</head>
<body data-my-info="1">
  <header class="topbar">
    <div class="brand">
      <strong id="myInfoPageTitle">나의 정보</strong>
    </div>
    <div class="top-actions">
      <a class="link" href="./index.html">← 악보 목록</a>
    </div>
  </header>

  <main class="container">
    <section class="myinfo-page-card">
      <div class="package-form myinfo-form">
        <div class="package-name-line">
          <span>닉네임</span>
          <strong id="myInfoNickname" class="myinfo-value">-</strong>
        </div>
        <div class="package-name-line">
          <span>이메일</span>
          <strong id="myInfoEmail" class="myinfo-value">-</strong>
        </div>
        <div class="package-name-line">
          <span>권한</span>
          <strong id="myInfoRole" class="myinfo-value">-</strong>
        </div>
        <label class="package-name-line" for="myInfoNewPassword">
          <span>새 비밀번호</span>
          <input id="myInfoNewPassword" class="input package-name-input" type="password" placeholder="5~15자 (영문/숫자/!@#)" />
        </label>
        <label class="package-name-line" for="myInfoNewPasswordConfirm">
          <span>비밀번호 확인</span>
          <input id="myInfoNewPasswordConfirm" class="input package-name-input" type="password" placeholder="비밀번호 확인" />
        </label>
        <div class="myinfo-actions">
          <button id="btnThemeToggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="다크 모드 전환">
            <span class="theme-toggle-track" aria-hidden="true">
              <span class="theme-toggle-thumb"></span>
            </span>
            <span id="themeToggleLabel" class="theme-toggle-label">라이트</span>
          </button>
          <button id="btnMyInfoLogout" class="btn" type="button">로그아웃</button>
          <button id="btnMyInfoChangePassword" class="btn" type="button">비밀번호 변경</button>
        </div>
        <div id="myInfoStatus" class="myinfo-status"></div>
      </div>
    </section>
    <section class="myinfo-packages-section">
      <strong id="myInfoPackagesTitle" class="myinfo-packages-title">나의 콘티</strong>
      <div class="vault-search-wrap">
        <input id="myPackagesSearch" class="input" type="text" placeholder="검색 (예: 콘티명 / 초성)" />
        <button id="btnClearMyPackagesSearch" class="vault-search-clear hidden" type="button" aria-label="검색어 전체 삭제">×</button>
      </div>
      <div id="myPackagesList" class="vault-list"></div>
    </section>
  </main>

  <nav class="mobile-tabbar" aria-label="모바일 네비게이션">
    <a class="mobile-tabbar-item" href="./index.html">
      <span class="mobile-tabbar-icon" aria-hidden="true">
        <svg class="mobile-tabbar-home" viewBox="0 0 24 24">
          <path d="M4.5 10.2 12 4l7.5 6.2V20a1 1 0 0 1-1 1h-4.1v-6.2H9.6V21H5.5a1 1 0 0 1-1-1z"></path>
        </svg>
      </span>
      <span class="mobile-tabbar-label">홈</span>
    </a>
    <a class="mobile-tabbar-item" href="./damgi.html">
      <span class="mobile-tabbar-icon" aria-hidden="true">
        <svg class="mobile-tabbar-damgi mobile-tabbar-damgi-index" viewBox="0 0 24 24">
          <path d="M7 3.5a1 1 0 0 0-1 1V19.5a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V8.2a1 1 0 0 0-.3-.7l-4-4A1 1 0 0 0 13 3H7z"></path>
          <path d="M13 3.9V8h4.1"></path>
          
          
        </svg>
      </span>
      <span class="mobile-tabbar-label">담기</span>
    </a>
    <a class="mobile-tabbar-item" href="./songlist.html">
      <span class="mobile-tabbar-icon" aria-hidden="true">
        <svg class="mobile-tabbar-list" viewBox="0 0 24 24">
          <path d="M5 7h14"></path>
          <path d="M5 12h14"></path>
          <path d="M5 17h14"></path>
        </svg>
      </span>
      <span class="mobile-tabbar-label">콘티</span>
    </a>
    <a class="mobile-tabbar-item" href="./favorite.html">
      <span class="mobile-tabbar-icon" aria-hidden="true">
        <svg class="mobile-tabbar-favorite" viewBox="0 0 24 24">
          <path d="M12 21s-6.7-4.35-9.3-8.3C.4 9.27 1.62 5.2 5.42 4.22A5.4 5.4 0 0 1 12 6.36a5.4 5.4 0 0 1 6.58-2.14c3.8.98 5.02 5.05 2.72 8.48C18.7 16.65 12 21 12 21Z"></path>
        </svg>
      </span>
      <span class="mobile-tabbar-label">찜</span>
    </a>
    <a class="mobile-tabbar-item is-current" href="./my-info.html" aria-current="page">
      <span class="mobile-tabbar-icon">
        <svg class="mobile-tabbar-profile" viewBox="0 0 24 24" aria-hidden="true">
          <circle class="mobile-tabbar-profile-head" cx="12" cy="8.8" r="3.4"></circle>
          <path class="mobile-tabbar-profile-body" d="M5.8 18.6c1.2-2.8 3.9-4.35 6.2-4.35s5 1.55 6.2 4.35c-1.4 1.08-3.63 1.8-6.2 1.8s-4.8-.72-6.2-1.8Z"></path>
        </svg>
      </span>
      <span class="mobile-tabbar-label">MY</span>
    </a>
  </nav>
</body>
</html>
