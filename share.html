  <script defer src="./supabase-config.js"></script>
  <script defer src="./supabase-client.js"></script>

<body>
  <header class="topbar">
    <div class="brand">
      <strong id="packageTitle">악보 패키지</strong>
      <span id="packageNamePreview" class="sub">공유된 악보 리스트</span>
      <div class="brand-social">
        <a id="packageVaultBtn" class="sub-btn" href="./vault-all.html">📂 기타</a>
      </div>
    </div>
    <div class="top-actions">">로그아웃</a>#">로그아웃</a>
      <a id="btnGoIndex" class="link" href="./index.html">← 악보 목록</a>
    </div>
  </header>

  <main class="container">
    <section class="share-card">
      <h2 class="h2">콘티</h2>
      <h2 id="downloadSummary" class="h2"></h2>
      <br>
      <h2 class="h2">악보 공유하기</h2>
      <div class="row download-actions">
        <button id="btnDownloadAll" class="btn primary">전체 PDF</button>
        <button id="btnPickSheets" class="btn">개별 페이지 선택</button>
        <button id="btnDownloadPicked" class="btn primary hidden">선택한 페이지 PDF 공유</button>
        <button id="btnSharePackageLink" class="btn">이 페이지 공유하기</button>
      </div>
    </section>

    <section class="share-card">
      <h2 class="h2">공유된 악보</h2>
      <div id="shareSheets" class="sheet-list"></div>
    </section>
  </main>
