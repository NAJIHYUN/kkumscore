  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>담기</title>

<body class="index-page" data-damgi="1">
  <header class="topbar">
    <div class="brand">
      <strong>담기</strong>
    </div>
  </header>

  <main class="container">
    <section class="share-card damgi-meta-card">
      <div class="package-form damgi-meta-form">
        <label class="add-label package-name-line" for="damgiPackageName">
          <span>콘티 이름 <em id="damgiNameRequired" class="damgi-required hidden">*필수</em></span>
          <input id="damgiPackageName" class="input package-name-input" type="text" placeholder="예: 260308 주일예배 콘티" />
        </label>
        <div class="add-label package-vault-line">
          <span>콘티 종류 <em id="damgiTeamRequired" class="damgi-required hidden">*필수</em></span>
          <div class="team-toggle" role="radiogroup" aria-label="콘티 대상">
            <label class="team-option">
              <input type="radio" name="damgiTeam" value="high" />
              <span>고등부</span>
            </label>
            <label class="team-option">
              <input type="radio" name="damgiTeam" value="middle" />
              <span>중등부</span>
            </label>
            <label class="team-option">
              <input type="radio" name="damgiTeam" value="etc" />
              <span>기타</span>
            </label>
          </div>
        </div>
        <label class="add-label package-note-line" for="damgiPackageMemo">
          <span>메모</span>
          <textarea id="damgiPackageMemo" class="input package-name-input package-note-input" rows="3" placeholder="메모를 입력하세요"></textarea>
        </label>
      </div>
    </section>
    <span class="damgi-list-title">담은 악보</span>
    <section id="damgiList" class="damgi-list"></section>
    <section class="damgi-controls">
      <button id="btnCreateFromDamgi" class="btn primary" type="button">콘티 생성</button>
    </section>
  </main>
