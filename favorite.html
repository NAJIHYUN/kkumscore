  <script src="./theme.js"></script>
  <link rel="stylesheet" href="./styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./supabase-config.js"></script>
  <script defer src="./supabase-client.js"></script>
  <script defer src="./auth-guard.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script defer src="./app.js"></script>
</head>
<body class="index-page" data-page="favorite">
  <header class="topbar">
      <div class="top-main">
        <div class="brand">
          <strong>찜 악보</strong>
        </div>
        <div class="top-actions">
          <a id="btnMyInfo" class="my-info-link hidden" href="./my-info.html" aria-label="나의 정보">
            <svg class="my-info-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle class="my-info-ring" cx="12" cy="12" r="8.7"></circle>
              <circle class="my-info-head" cx="12" cy="9.2" r="3.6"></circle>
              <path class="my-info-body" d="M5.6 18.45c1.15-2.75 3.78-4.2 6.4-4.2s5.25 1.45 6.4 4.2c-1.48 1.43-3.73 2.35-6.4 2.35s-4.92-.92-6.4-2.35Z"></path>
            </svg>
            <span class="sr-only">나의 정보</span>
          </a>
          <a class="link hidden" href="./share.html" title="공유 링크 열기(선택됨 없으면 비어있음)">공유페이지</a>
        </div>
      </div>
    <div class="brand-social">
      <a class="sub-btn" href="./vault-dreamhigh.html">☁️ 고등부</a>
      <a class="sub-btn" href="./vault-middle.html">😎 중등부</a>
      <a class="sub-btn" href="./vault-all.html">📂 기타</a>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <button id="btnSelectMode" class="btn home-btn">선택</button>
      <button id="btnClearSelected" class="btn home-btn hidden" type="button">선택 초기화</button>
      <button id="btnShareSelected" class="btn home-btn primary" disabled>콘티 생성</button>
      <div class="search-wrap">
        <input id="q" class="input" type="text" placeholder="악보 검색" />
        <button id="btnClearSearch" class="search-clear hidden" type="button" aria-label="검색어 지우기">×</button>
      </div>
      <div id="sortDropdown" class="sort-dropdown">
        <button id="sortTrigger" type="button" class="select sort-trigger" aria-haspopup="listbox" aria-expanded="false">가나다순</button>
        <div id="sortMenu" class="sort-menu hidden" role="listbox" aria-label="정렬 방식"></div>
        <select id="sort" class="select native-sort" aria-hidden="true" tabindex="-1">
          <option value="korean">가나다순</option>
          <option value="latest">최신순</option>
        </select>
      </div>
      <button id="btnMergeSelected" class="btn home-btn" disabled>악보 병합</button>
    </section>

    <section id="selectedBar" class="selected-bar selected-bar-collapsed">
      <div class="selected-head">
        <div class="selected-title">선택됨</div>
      </div>
      <div id="selectedChips" class="chips"></div>
    </section>

    <section class="table-wrap">
      <table class="table table-head">
        <thead>
          <tr>
            <th class="col-check"></th>
            <th class="col-title">곡명</th>
            <th class="col-artist">아티스트</th>
            <th class="col-key">Key</th>
            <th class="col-fav">찜하기</th>
            <th class="col-move">이동</th>
            <th class="col-act">다운로드</th>
            <th class="col-act">공유</th>
          </tr>
        </thead>
      </table>
      <div id="tableScroll" class="table-scroll">
        <table class="table table-body">
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div id="scrollIndex" class="scroll-index" aria-hidden="true">
        <span id="scrollIndexThumb" class="scroll-index-thumb"></span>
      </div>
    </section>
  </main>

  <nav class="mobile-tabbar" aria-label="모바일 네비게이션">
    <a class="mobile-tabbar-item" href="./index.html">
      <span class="mobile-tabbar-icon" aria-hidden="true">
        <svg class="mobile-tabbar-home" viewBox="0 0 24 24">
          <path d="M4.5 10.2 12 4l7.5 6.2V20a1 1 0 0 1-1 1h-4.1v-6.2H9.6V21H5.5a1 1 0 0 1-1-1z"></path>
        </svg>
      </span>
      <span class="mobile-tabbar-label">홈</span>
    </a>
    <a class="mobile-tabbar-item" href="./damgi.html">
      <span class="mobile-tabbar-icon" aria-hidden="true">
        <svg class="mobile-tabbar-damgi mobile-tabbar-damgi-index" viewBox="0 0 24 24">
          <path d="M7 3.5a1 1 0 0 0-1 1V19.5a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V8.2a1 1 0 0 0-.3-.7l-4-4A1 1 0 0 0 13 3H7z"></path>
          <path d="M13 3.9V8h4.1"></path>
          
          
        </svg>
      </span>
      <span class="mobile-tabbar-label">담기</span>
    </a>
    <a class="mobile-tabbar-item" href="./songlist.html">
      <span class="mobile-tabbar-icon" aria-hidden="true">
        <svg class="mobile-tabbar-list" viewBox="0 0 24 24">
          <path d="M5 7h14"></path>
          <path d="M5 12h14"></path>
          <path d="M5 17h14"></path>
        </svg>
      </span>
      <span class="mobile-tabbar-label">콘티</span>
    </a>
    <a class="mobile-tabbar-item is-current" href="./favorite.html" aria-current="page">
      <span class="mobile-tabbar-icon" aria-hidden="true">
        <svg class="mobile-tabbar-favorite" viewBox="0 0 24 24">
          <path d="M12 21s-6.7-4.35-9.3-8.3C.4 9.27 1.62 5.2 5.42 4.22A5.4 5.4 0 0 1 12 6.36a5.4 5.4 0 0 1 6.58-2.14c3.8.98 5.02 5.05 2.72 8.48C18.7 16.65 12 21 12 21Z"></path>
        </svg>
      </span>
      <span class="mobile-tabbar-label">찜</span>
    </a>
    <a class="mobile-tabbar-item mobile-tabbar-myinfo" href="./my-info.html">
      <span class="mobile-tabbar-icon">
        <svg class="mobile-tabbar-profile" viewBox="0 0 24 24" aria-hidden="true">
          <circle class="mobile-tabbar-profile-head" cx="12" cy="8.8" r="3.4"></circle>
          <path class="mobile-tabbar-profile-body" d="M5.8 18.6c1.2-2.8 3.9-4.35 6.2-4.35s5 1.55 6.2 4.35c-1.4 1.08-3.63 1.8-6.2 1.8s-4.8-.72-6.2-1.8Z"></path>
        </svg>
      </span>
      <span class="mobile-tabbar-label">MY</span>
    </a>
  </nav>

  <!-- Preview Modal -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <div id="mTitle" class="m-title"></div>
          <div id="mMeta" class="m-meta"></div>
        </div>
        <button class="btn" data-close="1">닫기</button>
      </div>
      <div class="modal-body">
        <button id="mPrevPage" class="preview-nav preview-nav-prev hidden" type="button" aria-label="이전 페이지">‹</button>
        <button id="mNextPage" class="preview-nav preview-nav-next hidden" type="button" aria-label="다음 페이지">›</button>
        <div id="mEditPanel" class="preview-edit-panel hidden">
          <div class="preview-edit-grid">
            <label class="add-label">
              <span>악보명</span>
              <input id="mEditTitle" class="input" type="text" />
            </label>
            <label class="add-label">
              <span>아티스트</span>
              <input id="mEditArtist" class="input" type="text" />
            </label>
            <label class="add-label">
              <span>Key</span>
              <select id="mEditKey" class="select">
                <option value="">선택</option>
                <option value="C">C</option>
                <option value="Db">Db</option>
                <option value="D">D</option>
                <option value="Eb">Eb</option>
                <option value="E">E</option>
                <option value="F">F</option>
                <option value="F#">F#</option>
                <option value="G">G</option>
                <option value="Ab">Ab</option>
                <option value="A">A</option>
                <option value="Bb">Bb</option>
                <option value="B">B</option>
              </select>
            </label>
            <label class="add-label">
              <span>페이지 추가 (PDF/JPG, 다중 가능)</span>
              <input id="mEditAddPages" class="input" type="file" accept="application/pdf,image/*" multiple />
            </label>
          </div>
          <div class="preview-edit-actions">
            <button id="mEditCancel" class="btn" type="button">수정 취소</button>
            <button id="mEditApply" class="btn primary" type="button">적용 저장</button>
          </div>
        </div>
        <img id="mImg" class="preview-img hidden" alt="미리보기" />
        <div id="mPdfMainWrap" class="pdf-main-wrap hidden">
          <canvas id="mPdfMain" class="pdf-main-canvas" aria-label="PDF 1페이지 미리보기"></canvas>
        </div>
        <div id="mPageStrip" class="page-strip hidden" aria-label="페이지 목록"></div>
      </div>
      <div class="modal-foot">
        <button id="mEditSong" class="btn" type="button">악보 수정</button>
        <button id="mDownloadPage" class="btn" type="button">페이지 선택</button>
        <button id="mSaveImage" class="btn" type="button">이미지 저장</button>
        <button id="mShareImage" class="btn" type="button">이미지 공유</button>
        <a id="mDownload" class="btn primary" download>PDF 저장</a>
        <button id="mSharePdf" class="btn" type="button">PDF 공유</button>
      </div>
    </div>
  </div>

  <!-- Add File Modal -->
  <div id="addModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close-add="1"></div>
    <div class="modal-card add-modal-card">
      <div class="modal-head">
        <div class="brand">
          <strong class="m-title">악보 추가</strong>
        </div>
        <button class="btn" data-close-add="1">닫기</button>
      </div>
      <form id="addFileForm" class="modal-body add-form">
        <div class="add-form-grid">
          <label class="add-label">
            <span>제목</span>
            <input id="addTitle" class="input" type="text" placeholder="ex. 푯대를 향하여" />
          </label>
          <label class="add-label">
            <span>아티스트</span>
            <input id="addArtist" class="input" type="text" placeholder="ex. 어노인팅" />
          </label>
          <label class="add-label">
            <span>Key</span>
            <select id="addKey" class="select">
              <option value="">선택</option>
              <option value="C">C</option>
              <option value="Db">Db</option>
              <option value="D">D</option>
              <option value="Eb">Eb</option>
              <option value="E">E</option>
              <option value="F">F</option>
              <option value="F#">F#</option>
              <option value="G">G</option>
              <option value="Ab">Ab</option>
              <option value="A">A</option>
              <option value="Bb">Bb</option>
              <option value="B">B</option>
            </select>
          </label>
        </div>
        <label class="add-file-field">
          <span>파일 (PDF/JPG, 이미지 다중 선택 가능)</span>
          <input id="addFileInput" class="input" type="file" accept="application/pdf,image/*" multiple required />
        </label>
        <div id="addUploadProgressWrap" class="upload-progress hidden" aria-live="polite">
          <div class="upload-progress-head">
            <span id="addUploadProgressText">업로드 준비 중...</span>
            <span id="addUploadProgressPercent">0%</span>
          </div>
          <div class="upload-progress-track">
            <div id="addUploadProgressBar" class="upload-progress-bar"></div>
          </div>
        </div>
      </form>
      <div class="modal-foot">
        <button class="btn add-modal-close-mobile" type="button" data-close-add="1">닫기</button>
        <button id="btnSubmitAddFile" class="btn primary" type="submit" form="addFileForm">추가</button>
      </div>
    </div>
  </div>

  <!-- Package Create Modal -->
  <div id="packageModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close-package="1"></div>
    <div class="modal-card package-modal-card">
      <div class="modal-head">
        <div>
          <div class="m-title">콘티 생성</div>
          <div class="m-meta">팀을 선택하고 공유 콘티를 생성합니다.</div>
        </div>
        <button id="btnClosePackageModal" class="btn" type="button">닫기</button>
      </div>
      <form id="packageForm" class="modal-body package-form">
        <label class="add-label package-name-line">
          <span>콘티 이름</span>
          <input id="packageNameInput" class="input package-name-input" type="text" placeholder="예: 260222 하오리 콘티" required />
        </label>
        <div class="add-label package-vault-line">
          <span>보관함</span>
          <div class="team-toggle" role="radiogroup" aria-label="콘티 대상">
            <label class="team-option">
              <input type="radio" name="packageTeam" value="high" />
              <span>고등부</span>
            </label>
            <label class="team-option">
              <input type="radio" name="packageTeam" value="middle" />
              <span>중등부</span>
            </label>
            <label class="team-option">
              <input type="radio" name="packageTeam" value="etc" />
              <span>기타</span>
            </label>
          </div>
        </div>
        <label class="add-label package-note-line">
          <span>메모</span>
          <textarea id="packageMemoInput" class="input package-name-input package-note-input" rows="4"></textarea>
        </label>
      </form>
      <div class="modal-foot">
        <button id="btnSubmitPackage" class="btn primary" type="submit" form="packageForm">생성</button>
      </div>
    </div>
  </div>

</body>
</html>
