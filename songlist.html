<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Songlist</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎼</text></svg>">
  <script src="./theme.js"></script>
  <link rel="stylesheet" href="./styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./supabase-config.js"></script>
  <script defer src="./supabase-client.js"></script>
  <script defer src="./auth-guard.js"></script>
  <script defer src="./songlist.js"></script>
</head>
<body class="index-page" data-songlist="1">
  <header class="topbar">
    <div class="brand">
      <strong>콘티</strong>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <div class="search-wrap songlist-search-wrap">
        <input id="songlistSearch" class="input" type="text" placeholder="검색" />
        <span class="songlist-search-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="6.5"></circle>
            <path d="m16 16 4.5 4.5"></path>
          </svg>
        </span>
      </div>
      <select id="songlistSort" class="select songlist-sort" aria-label="정렬">
        <option value="latest">최신순</option>
        <option value="oldest">오래된순</option>
      </select>
      <button class="btn home-btn songlist-vault-btn" type="button" data-vault-filter="high" aria-pressed="false">
        <img class="songlist-vault-icon" src="./assets/high.svg" alt="" />
        <span>고등부</span>
      </button>
      <button class="btn home-btn songlist-vault-btn" type="button" data-vault-filter="middle" aria-pressed="false">
        <img class="songlist-vault-icon" src="./assets/middle.png" alt="" />
        <span>중등부</span>
      </button>
      <button class="btn home-btn songlist-vault-btn" type="button" data-vault-filter="all" aria-pressed="false">
        <img class="songlist-vault-icon" src="./assets/allvault.png" alt="" />
        <span>기타</span>
      </button>
    </section>
    <section class="songlist-list-section">
      <div id="songlistList" class="vault-list"></div>
    </section>
  </main>

  <nav class="mobile-tabbar" aria-label="모바일 네비게이션">
    <a class="mobile-tabbar-item" href="./index.html">
      <span class="mobile-tabbar-icon" aria-hidden="true">
        <svg class="mobile-tabbar-home" viewBox="0 0 24 24">
          <path d="M4.5 10.2 12 4l7.5 6.2V20a1 1 0 0 1-1 1h-4.1v-6.2H9.6V21H5.5a1 1 0 0 1-1-1z"></path>
        </svg>
      </span>
      <span class="mobile-tabbar-label">홈</span>
    </a>
    <a class="mobile-tabbar-item" href="./damgi.html">
      <span class="mobile-tabbar-icon" aria-hidden="true">
        <svg class="mobile-tabbar-damgi" viewBox="0 0 24 24">
          <path d="M7 3.5h7.5L19.5 8v12.5H7z"></path>
          <path d="M14.5 3.5V8H19.5"></path>
          
          
        </svg>
      </span>
      <span class="mobile-tabbar-label">담기</span>
    </a>
    <a class="mobile-tabbar-item is-current" href="./songlist.html" aria-current="page">
      <span class="mobile-tabbar-icon" aria-hidden="true">
        <svg class="mobile-tabbar-list" viewBox="0 0 24 24">
          <path d="M5 7h14"></path>
          <path d="M5 12h14"></path>
          <path d="M5 17h14"></path>
        </svg>
      </span>
      <span class="mobile-tabbar-label">콘티</span>
    </a>
    <a class="mobile-tabbar-item" href="./favorite.html">
      <span class="mobile-tabbar-icon" aria-hidden="true">
        <svg class="mobile-tabbar-favorite" viewBox="0 0 24 24">
          <path d="M12 21s-6.7-4.35-9.3-8.3C.4 9.27 1.62 5.2 5.42 4.22A5.4 5.4 0 0 1 12 6.36a5.4 5.4 0 0 1 6.58-2.14c3.8.98 5.02 5.05 2.72 8.48C18.7 16.65 12 21 12 21Z"></path>
        </svg>
      </span>
      <span class="mobile-tabbar-label">찜</span>
    </a>
    <a class="mobile-tabbar-item" href="./my-info.html">
      <span class="mobile-tabbar-icon">
        <svg class="mobile-tabbar-profile" viewBox="0 0 24 24" aria-hidden="true">
          <circle class="mobile-tabbar-profile-head" cx="12" cy="8.8" r="3.4"></circle>
          <path class="mobile-tabbar-profile-body" d="M5.8 18.6c1.2-2.8 3.9-4.35 6.2-4.35s5 1.55 6.2 4.35c-1.4 1.08-3.63 1.8-6.2 1.8s-4.8-.72-6.2-1.8Z"></path>
        </svg>
      </span>
      <span class="mobile-tabbar-label">MY</span>
    </a>
  </nav>
</body>
</html>
